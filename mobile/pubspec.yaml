name: atm_anomaly_mobile
description: Mobile app for ATM Anomaly Detection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  video_player: ^2.8.1
  
  geolocator: ^10.1.0
  permission_handler: ^11.1.0
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  workmanager: ^0.5.2
  
  provider: ^6.1.1
  go_router: ^12.1.3
  
  http: ^1.1.2
  path_provider: ^2.1.1
  uuid: ^4.2.1
  intl: ^0.19.0
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
